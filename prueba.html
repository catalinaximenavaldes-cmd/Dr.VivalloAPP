<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Evolución Clínica</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 500px;
            margin: auto;
        }

        h2 {
            text-align: center;
        }

        .item {
            margin-bottom: 12px;
        }

        select {
            width: 100%;
            padding: 6px;
            margin-top: 4px;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            font-size: 16px;
            cursor: pointer;
        }

        textarea {
            width: 100%;
            margin-top: 15px;
            padding: 10px;
            height: 120px;
        }
    </style>
</head>

<body>
    <h2>Checklist Clínico</h2>
    <div class="item"> Dolor <select id="dolor">
            <option>No</option>
            <option>Sí</option>
        </select> </div>
    <div class="item"> Inflamación <select id="inflamacion">
            <option>No</option>
            <option>Sí</option>
        </select> </div>
    <div class="item"> Eritema <select id="eritema">
            <option>No</option>
            <option>Sí</option>
        </select> </div>
    <div class="item"> Edema <select id="edema">
            <option>No</option>
            <option>Sí</option>
        </select> </div>
    <div class="item"> Asimetría <select id="asimetria">
            <option>No</option>
            <option>Sí</option>
        </select> </div>
    <div class="item"> Sensibilidad <select id="sensibilidad">
            <option>Conservada</option>
            <option>Alterada</option>
        </select> </div> <button onclick="generarTexto()">Generar evolución</button> <button
        onclick="copiarTexto()">Copiar texto</button> <textarea id="resultado"
        placeholder="Aquí aparecerá la evolución..."></textarea>
    <script> function generarTexto() { let positivos = []; let negativos = []; function evaluar(id, nombre) { let valor = document.getElementById(id).value; if (valor === "Sí") { positivos.push(nombre); } else if (valor === "No") { negativos.push(nombre); } } evaluar("dolor", "dolor"); evaluar("inflamacion", "inflamación"); evaluar("eritema", "eritema"); evaluar("edema", "edema"); evaluar("asimetria", "asimetría"); let sensibilidad = document.getElementById("sensibilidad").value; let texto = "Paciente en control. "; if (positivos.length > 0) { texto += "Presenta " + positivos.join(", ") + ". "; } if (negativos.length > 0) { texto += "No presenta " + negativos.join(", ") + ". "; } texto += "Sensibilidad " + sensibilidad.toLowerCase() + "."; document.getElementById("resultado").value = texto; } function copiarTexto() { let texto = document.getElementById("resultado"); texto.select(); document.execCommand("copy"); alert("Texto copiado"); } </script>
</body>

</html>
