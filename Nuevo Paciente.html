<!DOCTYPE html> 
<html lang="es">
<head>
    <meta charset="UTF-8"> 
    <link rel="stylesheet" href="estilos.css"> 
    <title>Ingreso paciente</title>
    <style>
        /*estilo rápido para los botones*/
        .btn-inicio { background-color: #f0f0f0; margin-bottom: 20px; display: block; }
        .btn-guardar { background-color: #4CAF50; color: white; padding: 10px 20px; cursor: pointer; border: none; border-radius: 4px; }
        .btn-guardar:hover { background-color: #45a049; }
        .container { margin-top: 10px; }
    </style>
</head>

<body>

    <a href="index.html">
        <button type="button" class="btn-inicio">🏠 Volver al Menú Principal</button>
    </a>

    <hr> <h2>Ingreso de nuevo paciente</h2>

    <div class="container">
        Nombre y Apellido:<br>
        <input type="text" id="nombre">
    </div><br>

    <div class="container">
        Edad:<br>
        <input type="text" id="edad">
    </div><br>

    <div class="container">
        Cama:<br>
        <input type="text" id="cama">
    </div><br>

    <div class="container">
        Servicio:<br>
        <input type="text" id="servicio">
    </div><br>

    <div class="container">
        Diagnóstico:<br>
        <input type="text" id="diagnostico">
    </div><br>

    <button onclick="guardarPaciente()" class="btn-guardar">💾 Guardar Paciente</button>

    <br><br>

    <button onclick="window.history.back()" type="button">⬅️ Volver atrás</button>

    <script>
        function guardarPaciente() {
            const nombre = document.getElementById("nombre").value;
            const edad = document.getElementById("edad").value;
            const cama = document.getElementById("cama").value;
            const servicio = document.getElementById("servicio").value;
            const diagnostico = document.getElementById("diagnostico").value;

            if (!nombre) {
                alert("Por favor, completa el nombre del paciente.");
                return;
            }

            const datos = {
                nombre: nombre,
                edad: edad,
                cama: cama,
                servicio: servicio,
                diagnostico: diagnostico,
                evolucion: "Ingreso inicial registrado",
                accion: "guardar"
            };

            // URL ACTUALIZADA DE APPS SCRIPT
            const URL_APPS_SCRIPT = "https://script.google.com/macros/s/AKfycbw7uetD7_m1DfNtL3j2Tfrb3vQY1IRy0tA46dBAnn7Aa796WccGzqY0XCdb8HySj_uA/exec";

            fetch(URL_APPS_SCRIPT, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(datos)
            })
            .then(() => {
                alert("¡Paciente guardado con éxito!");
                window.location.href = "index.html"; 
            })
            .catch(error => {
                console.error("Error:", error);
                alert("Error al conectar con la base de datos.");
            });
        }
    </script>

</body>
</html>
