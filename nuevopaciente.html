<!DOCTYPE html> 
<html lang="es">
<head>
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilos.css"> 
    <title>Ingreso paciente - Dr. Vivallo APP</title>
    <style>
        /* Estilos específicos que tenías para esta página */
        .btn-inicio { background-color: #34495e; color: white; margin-bottom: 20px; display: block; }
        .btn-guardar { background-color: #27ae60; color: white; padding: 10px 20px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; }
        .btn-guardar:hover { background-color: #219150; }
        .container { margin-top: 10px; }
        input { width: 100%; padding: 8px; box-sizing: border-box; margin-top: 5px; border-radius: 4px; border: 1px solid #ccc; }
    </style>
</head>

<body>

    <header class="app-header">
        <img src="Logo Brasil.png" alt="Logo Brasil">
        <h1>Dr. Vivallo APP</h1>
    </header>

    <div class="main-content">
        
        <a href="index.html">
            <button type="button" class="btn-inicio">🏠 Inicio</button>
        </a>

        <hr> 
        
        <h2>Ingreso de nuevo paciente</h2>

        <div class="container">
            Nombre y Apellido:<br>
            <input type="text" id="nombre">
        </div><br>

        <div class="container">
            Edad:<br>
            <input type="text" id="edad">
        </div><br>

        <div class="container">
            Cama:<br>
            <input type="text" id="cama">
        </div><br>

        <div class="container">
            Servicio:<br>
            <input type="text" id="servicio">
        </div><br>

        <div class="container">
            Diagnóstico:<br>
            <input type="text" id="diagnostico">
        </div><br>

        <button onclick="guardarPaciente()" class="btn-guardar">💾 Guardar Paciente</button>

        <br><br>

        <button onclick="window.history.back()" type="button">⬅️ Volver atrás</button>
    </div>

    <script>
        function guardarPaciente() {
            const nombre = document.getElementById("nombre").value;
            const edad = document.getElementById("edad").value;
            const cama = document.getElementById("cama").value;
            const servicio = document.getElementById("servicio").value;
            const diagnostico = document.getElementById("diagnostico").value;

            if (!nombre) {
                alert("Por favor, completa el nombre del paciente.");
                return;
            }

            const datos = {
                nombre: nombre,
                edad: edad,
                cama: cama,
                servicio: servicio,
                diagnostico: diagnostico,
                evolucion: "Ingreso inicial registrado",
                accion: "guardar"
            };

            const URL_APPS_SCRIPT = "https://script.google.com/macros/s/AKfycbw7uetD7_m1DfNtL3j2Tfrb3vQY1IRy0tA46dBAnn7Aa796WccGzqY0XCdb8HySj_uA/exec";

            fetch(URL_APPS_SCRIPT, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(datos)
            })
            .then(() => {
                alert("¡Paciente guardado con éxito!");
                window.location.href = "index.html"; 
            })
            .catch(error => {
                console.error("Error:", error);
                alert("Error al conectar con la base de datos.");
            });
        }
    </script>

</body>
</html>
