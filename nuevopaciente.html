<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilos.css">
    <title>Ingreso paciente</title>
    <style>
        .btn-inicio { background-color: #34495e; color: white; margin-bottom: 20px; display: block; border: none; padding: 10px; border-radius: 4px; cursor: pointer; }
        .btn-guardar { background-color: #27ae60; color: white; padding: 10px 20px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; width: 100%; font-size: 16px; }
        .btn-guardar:hover { background-color: #219150; }
        .container { margin-top: 10px; }
        input { width: 100%; padding: 8px; box-sizing: border-box; margin-top: 5px; border-radius: 4px; border: 1px solid #ccc; }
        #preview_edad { color: #7f8c8d; font-size: 0.85rem; margin-top: 4px; font-weight: bold; }
    </style>
</head>
<body>
    <header class="app-header">
        <a href="index.html" style="text-decoration: none; display: flex; align-items: center; gap: 10px;">
            <img src="logo-brasil.png" alt="Logo Brasil" style="height: 50px; cursor: pointer;">
            <h1 style="color: white; margin: 0;">Dr.Vivallo</h1>
        </a>
    </header>

    <div class="main-content">
        <button type="button" class="btn-inicio" onclick="window.location.href='index.html'">Inicio</button>
        <hr>
        <h2>Ingreso de nuevo paciente</h2>

        <div class="container">
            Nombre y Apellido:<br>
            <input type="text" id="nombre" placeholder="Ej: Juan Perez">
        </div><br>

        <div class="container">
            Rut (sin puntos y con guion):<br>
            <input type="text" id="rut" placeholder="12345678-9" oninput="formatearRut(this)">
        </div><br>

        <div class="container">
            Fecha de Nacimiento:<br>
            <input type="date" id="fecha_nacimiento" onchange="mostrarEdadCalculada(this.value)">
            <div id="preview_edad"></div>
        </div><br>

        <div class="container">
            Dirección:<br>
            <input type="text" id="direccion" placeholder="Calle Falsa 123">
        </div><br>

        <div class="container">
            Telefono de Contacto:<br>
            <input type="text" id="telefono" placeholder="+569...">
        </div><br>

        <div class="container">
            Correo Electronico:<br>
            <input type="email" id="correo" placeholder="ejemplo@correo.com">
        </div><br>

        <div class="container">
            Motivo de consulta:<br>
            <input type="text" id="motivo_consulta" placeholder="Ej: Dolor lumbar de 3 dias de evolucion">
        </div><br>

        <div class="container">
            Cama:<br>
            <input type="text" id="cama" placeholder="Ej: 12B">
        </div><br>

        <div class="container">
            Servicio:<br>
            <input type="text" id="servicio" placeholder="Ej: Medicina interna">
        </div><br>

        <button onclick="guardarPaciente()" class="btn-guardar">Guardar Paciente</button>
        <br><br>
        <button onclick="window.history.back()" type="button" style="background:none; border:none; text-decoration:underline; cursor:pointer; color:#7f8c8d;">Volver atras</button>
    </div>

<script src="url.js"></script>
<script>
function mostrarEdadCalculada(fecha) {
    if (!fecha) return;
    const hoy = new Date();
    const cumple = new Date(fecha);
    let edad = hoy.getFullYear() - cumple.getFullYear();
    const m = hoy.getMonth() - cumple.getMonth();
    if (m < 0 || (m === 0 && hoy.getDate() < cumple.getDate())) edad--;
    document.getElementById("preview_edad").innerText = "Edad estimada: " + edad + " anos";
}

function formatearRut(input) {
    let valor = input.value.replace(/[^0-9kK]/g, "");
    if (valor.length > 1) {
        let cuerpo = valor.slice(0, -1);
        let dv = valor.slice(-1).toLowerCase();
        input.value = cuerpo + "-" + dv;
    }
}

async function guardarPaciente() {
    const nombre = document.getElementById("nombre").value.trim();
    const rut = document.getElementById("rut").value.trim();
    const fecha_nacimiento = document.getElementById("fecha_nacimiento").value;
    const direccion = document.getElementById("direccion").value.trim();
    const telefono = document.getElementById("telefono").value.trim();
    const correo = document.getElementById("correo").value.trim();
    const motivoConsulta = document.getElementById("motivo_consulta").value.trim();
    const cama = document.getElementById("cama").value.trim();
    const servicio = document.getElementById("servicio").value.trim();

    if (!nombre || !rut || !fecha_nacimiento) {
        alert("Nombre, RUT y Fecha de Nacimiento son obligatorios.");
        return;
    }

    const btn = document.querySelector(".btn-guardar");
    btn.innerText = "Guardando...";
    btn.disabled = true;

    const detalleIngreso = [
        motivoConsulta ? "Motivo de consulta: " + motivoConsulta : "",
        cama ? "Cama: " + cama : "",
        servicio ? "Servicio: " + servicio : ""
    ].filter(Boolean).join("\n");

    const datosPaciente = {
        nombre: nombre,
        rut: rut,
        fecha_nacimiento: fecha_nacimiento,
        direccion: direccion,
        telefono: telefono,
        correo: correo,
        evolucion: detalleIngreso || "Ingreso inicial registrado"
    };

    try {
        await fetch(CONFIG.API_URL, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(datosPaciente)
        });
        alert("Paciente guardado con exito.");
        window.location.href = "index.html";
    } catch (error) {
        alert("Error al conectar.");
        btn.innerText = "Guardar Paciente";
        btn.disabled = false;
    }
}
</script>
</body>
</html>
