<!DOCTYPE html>
<html lang="es">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8"> 
    <link rel="stylesheet" href="estilos.css"> 
    <title>Dr. Vivallo APP - Inicio</title>
</head>

<body>
    <header class="app-header">
        <img src="Logo Brasil.png" alt="Logo Brasil">  
        <h1>Dr. Vivallo APP</h1>
    </header>

    <div class="main-content">
        
        <h2>Menú principal</h2>

        <div style="margin-top:20px;">
            <button onclick="irIngreso()">➕ Generar nuevo paciente</button>
            <button onclick="irPacientes()">👥 Ver pacientes</button>
            <button onclick="irEvolucion()">📝 Generar evolución</button>
        </div>

    </div> <script>
        function irIngreso() {
            window.location.href = "Nuevo paciente.html";
        }

        function irPacientes() {
            window.location.href = "pacientes.html";
        }

        function irEvolucion() {
            let paciente = localStorage.getItem("pacienteActual");
            if (!paciente) {
                alert("Primero selecciona un paciente en la lista");
            } else {
                window.location.href = "evolución.html";
            }
        }
    </script>

</body>
</html>
