<!DOCTYPE html>
<html lang="es">
<head>
<link rel="stylesheet" href="estilos.css"> 
<meta charset="UTF-8"> 
</head>
<div style="margin-top:20px;">
  <a href="Generar paciente.html" class="button"><button>Generar nuevo paciente</button></a>
  <a href="pacientes.html" class="button"><button>Ver pacientes</button></a>
  <a href="evolución.html" class="button"><button>Generar evolución</button></a>

</div>
<script>
// Simulación de paciente actual (puedes mejorarlo después)
let pacienteActual = {
  evolucion: ""
}

// Botón: nuevo paciente
function nuevoPaciente() {
  // Limpiar selects
  document.querySelectorAll("select").forEach(select => {
    select.selectedIndex = 0;
  });

  // Limpiar texto
  document.getElementById("resultado").value = "";

  // Resetear paciente
  pacienteActual = {
    evolucion: ""
  };

  alert("Nuevo paciente listo");
}

// Botón: ver paciente
function verPaciente() {
  let texto = document.getElementById("resultado").value;

  if (!texto) {
    alert("No hay evolución generada");
  } else {
    alert("Evolución actual:\n\n" + texto);
  }
}
</script>
