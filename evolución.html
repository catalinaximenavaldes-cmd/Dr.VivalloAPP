"prueba de que funciona evolución"
<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="stylesheet" href="estilos.css"> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evolución Clínica - Dr. Vivallo APP</title>
</head>

<body>

    <header class="app-header">
        <img src="Logo Brasil.png" alt="Logo Brasil">
        <h1>Dr. Vivallo APP</h1>
    </header>

    <div class="main-content">
        
        <a href="index.html">
            <button type="button" style="margin-bottom: 20px; background-color: #2c3e50; color: white;">🏠 Inicio</button>
        </a>
        <hr>

        <h2>Evolución Clínica</h2>

        <div>
            Paciente:
            <input type="text" id="nombre" readonly style="background-color: #eee; border: 1px solid #ccc; padding: 8px; width: 100%; border-radius: 4px;">
        </div><br>

        <div class="item">
            HDN
            <select id="HDN">
                <option>Estable</option>
                <option>Inestable</option>
            </select>
        </div>

        <div class="item">
            Mecánica respiratoria
            <select id="Mecanicarespiratoria">
                <option>Buena</option>
                <option>Mala</option>
            </select>
        </div>

        <div class="item">
            Novedades
            <select id="Novedades"><option>No</option><option>Si</option></select>
        </div>

        <div class="item">
            Dolor
            <select id="Dolor"><option>No</option><option>Sí</option></select>
        </div>

        <div class="item">
            Nauseas
            <select id="Nauseas"><option>No</option><option>Si</option></select>
        </div>

        <div class="item">
            Disnea
            <select id="Disnea"><option>No</option><option>Si</option></select>
        </div>

        <div class="item">
            Eventos CV
            <select id="EventosCV"><option>No</option><option>Si</option></select>
        </div>

        <div class="item">
            EF
            <select id="EF" onchange="mostrarEF()">
                <option>Sin Cambios</option>
                <option>Alterado</option>
            </select>
        </div>

        <div id="detalleEF" style="display:none;">
            Detalle alteraciones:
            <input type="text" id="textoEF" style="width: 100%; padding: 8px; margin-top: 5px;">
        </div>

        <br>

        <button onclick="generarTexto()">Generar evolución</button>
        <button onclick="guardarEvolucion()" style="background-color: #27ae60; color: white;">Guardar evolución</button>
        <button onclick="copiarTexto()">Copiar texto</button>

        <br><br>

        <textarea id="resultado" placeholder="Aquí aparecerá la evolución..." rows="6" style="width: 100%; box-sizing: border-box;"></textarea>

        <br><br>

        <button onclick="window.history.back()">⬅ Volver atrás</button>
    </div>

<script>
//PACIENTE ACTUAL
let pacienteActual = localStorage.getItem("pacienteActual");

if (pacienteActual) {
    document.getElementById("nombre").value = pacienteActual;
} else {
    alert("No hay paciente seleccionado");
}

// MOSTRAR EF
function mostrarEF() {
    let valor = document.getElementById("EF").value;
    document.getElementById("detalleEF").style.display = (valor === "Alterado") ? "block" : "none";
    if (valor !== "Alterado") document.getElementById("textoEF").value = "";
}

//GENERAR TEXTO
function generarTexto() {
    let positivos = [];
    let negativos = [];

    function evaluar(id, nombre) {
        let valor = document.getElementById(id).value;
        if (valor === "Sí" || valor === "Si") positivos.push(nombre);
        if (valor === "No") negativos.push(nombre);
    }

    evaluar("Novedades", "novedades");
    evaluar("Dolor", "dolor");
    evaluar("Nauseas", "nauseas");
    evaluar("Disnea", "disnea");
    evaluar("EventosCV", "eventos CV");

    let HDN = document.getElementById("HDN").value;
    let MR = document.getElementById("Mecanicarespiratoria").value;

    let texto = `Paciente ${pacienteActual} en control. `;
    texto += "HDN " + HDN.toLowerCase() + ". ";
    texto += "Mecánica respiratoria " + MR.toLowerCase() + ". ";

    if (positivos.length > 0) texto += "Presenta " + positivos.join(", ") + ". ";
    if (negativos.length > 0) texto += "No presenta " + negativos.join(", ") + ". ";

    let EF = document.getElementById("EF").value;
    if (EF === "Alterado") {
        texto += "Examen físico alterado: " + document.getElementById("textoEF").value + ". ";
    } else {
        texto += "Examen físico sin cambios. ";
    }

    document.getElementById("resultado").value = texto;
}

//GUARDAR EN GOOGLE SHEETS
function guardarEvolucion() {
    let nombre = localStorage.getItem("pacienteActual");
    let evolucion = document.getElementById("resultado").value;

    if (!evolucion) {
        alert("Primero genera la evolución antes de guardar");
        return;
    }

    const URL = "https://script.google.com/macros/s/AKfycbzZwaExcLBy8vl1FJBr45UersToxLef9RCfCuSQXJpJ2fc7IjdmZq_b47-OVI17W6yq/exec";

    fetch(URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            nombre: nombre,
            accion: "guardar",
            evolucion: evolucion,
            edad: "",
            cama: "",
            servicio: "",
            diagnostico: ""
        })
    })
    .then(() => {
        alert("Evolución guardada con éxito");
        document.getElementById("resultado").value = "";
        window.location.href = "pacientes.html";
    })
    .catch(err => alert("Error al guardar: " + err));
}

//COPIAR
function copiarTexto() {
    let texto = document.getElementById("resultado");
    if (!texto.value) return alert("No hay texto para copiar");
    texto.select();
    document.execCommand("copy");
    alert("Texto copiado al portapapeles");
}
</script>

</body>
</html>
