<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imagenes del Paciente - CliniBienVital</title>
    <link rel="stylesheet" href="estilos.css">
    <style>
        .cabecera-imagenes {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .subida-box,
        .estado {
            background: #fff;
            border-radius: 12px;
            padding: 16px;
            color: #52606d;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
        }
        .subida-box {
            margin-top: 16px;
            color: #2c3e50;
        }
        .subida-box input {
            margin-top: 10px;
        }
        .galeria {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 320px));
            gap: 18px;
            margin-top: 20px;
        }
        .card-imagen {
            background: #fff;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
            border: 1px solid #d9e2ec;
            max-width: 320px;
        }
        .preview {
            display: block;
            width: 100%;
            height: 120px;
            object-fit: cover;
            background: #eef2f6;
        }
        .preview-vacia {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 120px;
            background: linear-gradient(135deg, #eef2f6, #dde7f0);
            color: #607080;
            font-weight: 700;
            text-align: center;
            padding: 16px;
        }
        .card-contenido {
            padding: 14px;
        }
        .card-contenido h3 {
            margin: 0 0 8px;
            font-size: 1rem;
            color: #2c3e50;
        }
        .meta {
            margin: 0 0 8px;
            color: #5b6b7a;
            font-size: 0.92rem;
        }
        .acciones {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 12px;
        }
        .acciones a {
            text-decoration: none;
            padding: 10px 12px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.92rem;
        }
        .estado-drive {
            display: inline-block;
            margin-top: 8px;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 0.82rem;
            font-weight: 700;
            background: #fff4d6;
            color: #8a6d1d;
        }
        .btn-abrir {
            background: #2980b9;
            color: #fff;
        }
        .btn-drive {
            background: #ecf0f1;
            color: #2c3e50;
        }
        @media (max-width: 640px) {
            .preview {
                height: 100px;
            }
            .preview-vacia {
                height: 100px;
            }
            .acciones a {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <header class="app-header">
        <div style="display: flex; align-items: center; justify-content: center; gap: 10px;">
            <img src="urinario.png" alt="Logo Urinario" style="height: 50px;">
            <h1 style="color: white; margin: 0;">CliniBienVital</h1>
        </div>
    </header>

    <div class="main-content">
        <div class="cabecera-imagenes">
            <div style="display:flex; gap:10px; flex-wrap:wrap;">
                <button class="btn-volver" onclick="volverAPaciente()">Volver</button>
            </div>
            <div>
                <h2 id="titulo-paciente" style="margin:0; color:#2c3e50;">Imagenes del Paciente</h2>
                <div id="subtitulo-paciente" style="color:#5b6b7a; margin-top:4px;">Cargando datos...</div>
            </div>
        </div>

        <div id="estado" class="estado">Buscando imagenes registradas...</div>

        <div class="subida-box">
            <strong>Subir nueva imagen</strong>
            <input type="text" id="descripcion-imagen" placeholder="Descripcion de la imagen">
            <input type="file" id="archivo-imagen" accept="image/*,.pdf">
            <button class="btn-guardar" onclick="subirImagen()">Subir Imagen</button>
        </div>

        <div id="galeria" class="galeria"></div>
    </div>

    <script src="url.js"></script>
    <script>
        const URL_BASE = CONFIG.API_URL;
        const pacienteActual = localStorage.getItem("pacienteActual") || "";

        function normalizarTexto(valor) {
            return (valor || "").toString().trim().toLowerCase();
        }

        function formatearFecha(valor) {
            const fecha = new Date(valor);
            return Number.isNaN(fecha.getTime()) ? "Sin fecha" : fecha.toLocaleDateString("es-CL");
        }

        function extraerFileId(url) {
            const texto = (url || "").toString();
            const match = texto.match(/\/d\/([a-zA-Z0-9_-]+)/);
            return match ? match[1] : "";
        }

        function construirVistaPrevia(fileId, url) {
            if (fileId) return `https://drive.google.com/thumbnail?id=${fileId}&sz=w1200`;
            return url || "";
        }

        function construirApertura(fileId, url) {
            if (fileId) return `https://drive.google.com/file/d/${fileId}/view`;
            return url || "#";
        }

        function volverAPaciente() {
            if (pacienteActual) {
                localStorage.setItem("pacienteActual", pacienteActual);
                localStorage.setItem("volverAFichaPaciente", "1");
            }
            window.location.href = "pacientes.html";
        }

        async function obtenerImagenesRegistradas(nombrePaciente, rutPaciente) {
            const query = `${URL_BASE}?accion=listarImagenesPaciente&nombre=${encodeURIComponent(nombrePaciente)}&rut=${encodeURIComponent(rutPaciente)}`;

            try {
                const resImagenes = await fetch(query);
                const imagenes = await resImagenes.json();
                if (Array.isArray(imagenes)) {
                    return imagenes;
                }
            } catch (error) {
                console.warn("Fallo lectura por accion listarImagenesPaciente, usando hoja ImagenesPacientes.", error);
            }

            try {
                const resHoja = await fetch(URL_BASE + "?tabla=ImagenesPacientes");
                const dataHoja = await resHoja.json();
                if (!Array.isArray(dataHoja)) return [];

                return dataHoja
                    .slice(1)
                    .filter(fila => {
                        const nombreFila = normalizarTexto(fila[1]);
                        const rutFila = normalizarTexto(fila[2]);
                        return (rutPaciente && rutFila === normalizarTexto(rutPaciente)) || nombreFila === normalizarTexto(nombrePaciente);
                    })
                    .map(fila => ({
                        fecha: fila[0] || "",
                        nombre: fila[1] || "",
                        rut: fila[2] || "",
                        descripcion: fila[3] || "",
                        fileId: fila[4] || "",
                        url: fila[5] || ""
                    }));
            } catch (error) {
                console.error("Error al leer hoja ImagenesPacientes:", error);
                return [];
            }
        }

        async function obtenerRutPaciente() {
            const resPacientes = await fetch(URL_BASE + "?tabla=Hoja 1");
            const dataPacientes = await resPacientes.json();
            const filaPaciente = dataPacientes.slice(1).find(fila => normalizarTexto(fila[1]) === normalizarTexto(pacienteActual));
            return filaPaciente ? (filaPaciente[2] || "").toString().trim() : "";
        }

        async function cargarImagenes() {
            if (!pacienteActual) {
                document.getElementById("estado").innerText = "No hay paciente seleccionado.";
                return;
            }

            document.getElementById("titulo-paciente").innerText = `Imagenes de ${pacienteActual}`;

            try {
                const rutPaciente = await obtenerRutPaciente();
                document.getElementById("subtitulo-paciente").innerText = rutPaciente ? `RUT: ${rutPaciente}` : "Sin RUT asociado";

                const imagenes = await obtenerImagenesRegistradas(pacienteActual, rutPaciente);

                const estado = document.getElementById("estado");
                const galeria = document.getElementById("galeria");

                if (!imagenes.length) {
                    estado.innerText = "No hay imagenes registradas para esta paciente.";
                    galeria.innerHTML = "";
                    return;
                }

                estado.innerText = `Se encontraron ${imagenes.length} imagen(es) registradas.`;

                galeria.innerHTML = imagenes.map(item => {
                    const fecha = item.fecha || "";
                    const descripcion = item.descripcion || "Imagen sin descripcion";
                    const fileId = (item.fileId || "").toString().trim() || extraerFileId(item.url || "");
                    const url = (item.url || "").toString().trim();
                    const preview = construirVistaPrevia(fileId, url);
                    const apertura = construirApertura(fileId, url);
                    const tieneDrive = Boolean(fileId || url);
                    const visual = tieneDrive
                        ? `
                            <a href="${apertura}" target="_blank" rel="noopener noreferrer">
                                <img class="preview" src="${preview}" alt="${descripcion}">
                            </a>
                          `
                        : `
                            <div class="preview-vacia">
                                Archivo registrado, pero aun sin enlace visible de Drive
                            </div>
                          `;
                    const acciones = tieneDrive
                        ? `
                            <div class="acciones">
                                <a class="btn-abrir" href="${apertura}" target="_blank" rel="noopener noreferrer">Abrir Imagen</a>
                                <a class="btn-drive" href="${url || apertura}" target="_blank" rel="noopener noreferrer">Ver en Drive</a>
                            </div>
                          `
                        : `
                            <div class="estado-drive">Pendiente de enlace de Drive</div>
                          `;

                    return `
                        <article class="card-imagen">
                            ${visual}
                            <div class="card-contenido">
                                <h3>${descripcion}</h3>
                                <p class="meta">Fecha: ${formatearFecha(fecha)}</p>
                                ${acciones}
                            </div>
                        </article>
                    `;
                }).join("");
            } catch (error) {
                console.error("Error al cargar imagenes:", error);
                document.getElementById("estado").innerText = "No se pudieron cargar las imagenes del paciente.";
            }
        }

        async function subirImagen() {
            if (!pacienteActual) {
                alert("No hay paciente seleccionado.");
                return;
            }

            const archivo = document.getElementById("archivo-imagen").files[0];
            if (!archivo) {
                alert("Seleccione un archivo para subir.");
                return;
            }

            const rutPaciente = await obtenerRutPaciente();
            if (!rutPaciente) {
                alert("No se pudo identificar el RUT del paciente.");
                return;
            }

            const descripcionInput = document.getElementById("descripcion-imagen");
            const descripcion = (descripcionInput.value || "").trim() || archivo.name.replace(/\.[^.]+$/, "");
            const boton = document.querySelector(".subida-box .btn-guardar");
            if (boton) {
                boton.disabled = true;
                boton.innerText = "Subiendo...";
            }

            const reader = new FileReader();
            reader.onload = async () => {
                try {
                    const resultado = String(reader.result || "");
                    const base64 = resultado.includes(",") ? resultado.split(",")[1] : resultado;

                    await fetch(URL_BASE, {
                        method: "POST",
                        mode: "no-cors",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            accion: "subirImagenPaciente",
                            nombre: pacienteActual,
                            rut: rutPaciente,
                            descripcion,
                            fileName: archivo.name,
                            mimeType: archivo.type || "application/octet-stream",
                            fileBase64: base64
                        })
                    });

                    document.getElementById("archivo-imagen").value = "";
                    descripcionInput.value = "";
                    document.getElementById("estado").innerText = "Imagen subida correctamente.";
                    setTimeout(cargarImagenes, 1200);
                } catch (error) {
                    console.error("Error al subir imagen:", error);
                    alert("No se pudo subir la imagen.");
                } finally {
                    if (boton) {
                        boton.disabled = false;
                        boton.innerText = "Subir Imagen";
                    }
                }
            };

            reader.onerror = () => {
                if (boton) {
                    boton.disabled = false;
                    boton.innerText = "Subir Imagen";
                }
                alert("No se pudo leer el archivo seleccionado.");
            };

            reader.readAsDataURL(archivo);
        }

        cargarImagenes();
    </script>
</body>
</html>
