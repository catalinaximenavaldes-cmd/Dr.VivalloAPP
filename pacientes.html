<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Pacientes - Dr. Vivallo APP</title>
    <link rel="stylesheet" href="estilos.css">
</head>

<body>

    <header class="app-header">
        <img src="Logo Brasil.png" alt="Logo Brasil">
        <h1>Dr. Vivallo APP</h1>
    </header>

    <div class="main-content">
        
        <a href="index.html">
            <button type="button" style="margin-bottom: 20px; background-color: #2c3e50; color: white;">🏠 Inicio</button>
        </a>
        <hr>

        <h2>Pacientes ingresados</h2>

        <div id="lista">Cargando...</div>

        <br>
        <button id="btnVolverGeneral" onclick="window.location.href='index.html'">⬅ Volver al Menú</button>
    </div>

<script>
// URL de tu Apps Script
const URL = "https://script.google.com/macros/s/AKfycbzZwaExcLBy8vl1FJBr45UersToxLef9RCfCuSQXJpJ2fc7IjdmZq_b47-OVI17W6yq/exec";

let pacientes = {};

fetch(URL)
  .then(res => res.json())
  .then(data => {
    // Limpiamos el objeto por si acaso
    pacientes = {}; 
    for (let i = 1; i < data.length; i++) {
      let fila = data[i];
      let nombre = fila[1];
      if (!pacientes[nombre]) {
        pacientes[nombre] = [];
      }
      pacientes[nombre].push({
        edad: fila[2],
        cama: fila[3],
        servicio: fila[4],
        diagnostico: fila[5],
        evolucion: fila[6],
        fecha: new Date(fila[0])
      });
    }
    mostrarLista();
  });

// 🧾 LISTA DE PACIENTES (NOMBRES)
function mostrarLista() {
  document.getElementById("btnVolverGeneral").style.display = "block";
  
  let html = "<h3>Lista de Pacientes</h3>";
  for (let nombre in pacientes) {
    html += `
      <div class="card-paciente" onclick="verPaciente('${nombre}')">
        👤 ${nombre}
      </div>
    `;
  }
  document.getElementById("lista").innerHTML = html;
}

// 👤 VER FICHA DEL PACIENTE (LISTA DE EVOLUCIONES)
function verPaciente(nombre) {
  document.getElementById("btnVolverGeneral").style.display = "none";
  
  localStorage.setItem("pacienteActual", nombre);
  let evoluciones = pacientes[nombre];

  // Ordenamos: La más reciente arriba para facilitar la lectura clínica
  evoluciones.sort((a, b) => b.fecha - a.fecha);

  let html = `
    <h3>${nombre}</h3>
    <button onclick="nuevaEvolucion()">➕ Nueva evolución</button>
    <button onclick="altaPaciente('${nombre}')">🏥 Alta paciente</button>
    <br><br>
  `;

  // LÓGICA DE CONTEO INVERSO: 
  // La evolución más antigua será la "Evolución 1"
  let total = evoluciones.length;

  evoluciones.forEach((e, index) => {
    let numeroEvolucion = total - index; 

    html += `
      <div class="card-paciente" onclick="verEvolucion('${nombre}', ${index})">
        📄 Evolución ${numeroEvolucion}
        <br><small>${e.fecha.toLocaleString()}</small>
      </div>
    `;
  });

  html += `<br><button onclick="mostrarLista()">⬅ Volver a la lista</button>`;
  document.getElementById("lista").innerHTML = html;
}

// 📄 VER DETALLE DE UNA EVOLUCIÓN
function verEvolucion(nombre, index) {
  let evoluciones = pacientes[nombre];
  evoluciones.sort((a, b) => b.fecha - a.fecha);
  let e = evoluciones[index];

  let html = `
    <h3>${nombre}</h3>
    <div class="card-evolucion">
      <b>Fecha:</b> ${e.fecha.toLocaleString()}<br>
      <b>Edad:</b> ${e.edad}<br>
      <b>Cama:</b> ${e.cama}<br>
      <b>Servicio:</b> ${e.servicio}<br>
      <b>Diagnóstico:</b> ${e.diagnostico}<br><br>
      <div style="background: #f9f9f9; padding: 10px; border-left: 4px solid #2c3e50; text-align: left;">
        <i>${e.evolucion}</i>
      </div>
    </div>
    <br>
    <button onclick="eliminarEvolucion('${nombre}', '${e.fecha.toISOString()}')" style="background-color: #e74c3c; color: white;">
      🗑️ Eliminar esta evolución
    </button>
    <br><br>
    <button onclick="verPaciente('${nombre}')">⬅ Volver al paciente</button>
  `;
  document.getElementById("lista").innerHTML = html;
}

// 🗑️ ELIMINAR EVOLUCIÓN
function eliminarEvolucion(nombre, fecha) {
  if (!confirm("¿Seguro que quieres eliminar esta evolución?")) return;
  fetch(URL, {
    method: "POST",
    mode: "no-cors",
    body: JSON.stringify({
      accion: "eliminar",
      nombre: nombre,
      fecha: fecha
    })
  })
  .then(() => {
    alert("Evolución eliminada");
    location.reload();
  });
}

// 🏥 ALTA PACIENTE
function altaPaciente(nombre) {
  if (!confirm("¿Dar de alta? Se borrarán todos los registros de este paciente.")) return;
  fetch(URL, {
    method: "POST",
    mode: "no-cors",
    body: JSON.stringify({
      accion: "alta",
      nombre: nombre
    })
  })
  .then(() => {
    alert("Paciente dado de alta");
    location.reload();
  });
}

function nuevaEvolucion() {
  window.location.href = "evolución.html";
}
</script>

</body>
</html>
