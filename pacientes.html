<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial Clinico</title>
    <link rel="stylesheet" href="estilos.css">
    <style>
        .perfil-paciente p { margin: 10px 0; font-size: 1rem; color: #34495e; border-bottom: 1px solid #f1f1f1; padding-bottom: 5px; }
        .item-sesion { font-size: 0.9rem; padding: 10px 0; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; color: #2f3640; }
        .contenido-nota { display: none; background: #fdfdfd; padding: 15px; border: 1px solid #ddd; border-top: none; border-radius: 0 0 8px 8px; margin-bottom: 15px; line-height: 1.6; }
        .btn-editar-ficha {
            background: #f1c40f;
            border: none;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            line-height: 1;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
        }
        .btn-editar-ficha:hover {
            filter: brightness(0.98);
        }
        #modal-edicion > div {
            width: calc(100% - 24px);
            box-sizing: border-box;
        }
        @media (max-width: 640px) {
            #modal-edicion > div {
                margin: 16px auto;
                padding: 16px;
                max-width: 100%;
            }
        }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>
<header class="app-header no-print">
    <a href="index.html" style="text-decoration: none; display: flex; align-items: center; gap: 10px;">
        <img src="urinario.png" alt="Logo Urinario" style="height: 50px;">
        <h1 style="color: white; margin: 0;">Dr.Vivallo</h1>
    </a>
</header>

<div class="main-content">
    <button class="btn-volver no-print" onclick="window.location.href='index.html'">Inicio</button>
    <h2 id="titulo-pagina" style="text-align:center;">Pacientes ingresados</h2>
    <div id="lista">Cargando base de datos...</div>
    <br>
    <button id="btnVolverLista" style="display:none;" onclick="location.reload()" class="btn-volver no-print">Volver a la lista</button>
</div>

<div id="modal-edicion" class="no-print" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:999;">
  <div style="background:white; max-width:500px; margin:5% auto; padding:20px; border-radius:12px;">
    <h3>Editar Paciente</h3>
    <input id="modal-nombre" placeholder="Nombre" style="width:100%; margin-bottom:8px;">
    <input id="modal-rut" placeholder="RUT" style="width:100%; margin-bottom:8px;">
    <input id="modal-fecha-nacimiento" type="date" placeholder="Fecha de nacimiento" style="width:100%; margin-bottom:8px;">
    <input id="modal-direccion" placeholder="Direccion" style="width:100%; margin-bottom:8px;">
    <input id="modal-telefono" placeholder="Telefono" style="width:100%; margin-bottom:8px;">
    <input id="modal-correo" placeholder="Correo" style="width:100%; margin-bottom:8px;">
    <button onclick="guardarEdicionPaciente()" style="background:#27ae60; color:white; width:100%; padding:10px; border:none; border-radius:8px;">Guardar Cambios</button>
    <button onclick="cerrarModal()" style="margin-top:10px; width:100%;">Cancelar</button>
  </div>
</div>

<script src="url.js?v=20260328"></script>
<script src="pacientes.js?v=20260328b"></script>
</body>
</html>
